#CI de nivel 01 - Disparo manual através de clique
#nome da pipeline
name: 'Execução Manual'

#gatilho / triggers - regras de disparo
#gatilho manual = workflow_dispatch
on:
  workflow_dispatch:

#jobs - tarefas dentro da pipeline
jobs:
  #nome do job
  e2e-tests:

    #maquina onde o job vai rodar
    runs-on: ubuntu-latest

    #passos do job
    steps:
      #clone do projeto
      - uses: actions/checkout@v4
      
      #instalação do node
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      #instalação do Yarn
      - name: Instalando o Yarn
        run: npm install -g yarn

      #instalação das dependências
      - name: Instalando dependências
        run: yarn

      #instalação do browser do playwright
      - name: Instalando o browser do Playwright
        run: yarn playwright install

      #execução dos testes e2e
      - name: Executando os testes e2e
        run: yarn run e2e